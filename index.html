<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Of The Day</title>
  <style>
    /* Modern Styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      color: #4a90e2;
      margin-bottom: 20px;
    }

    #quote-container {
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #quote {
      font-size: 1.2rem;
      font-style: italic;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    #author {
      font-weight: bold;
      color: #666;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 1rem;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    button:hover {
      background-color: #357abd;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Quote Of The Day - CWS edition</h1>
    
    <div id="quote-container">
      <p id="quote">Click the button for some wisdom</p>
      <p id="author"></p>
    </div>

    <button onclick="getQuote()">Get Inspired Lah!</button>
  </div>

  <script>
    const myQuotes = [
      // Personal & Local Quotes
      { quote: "Orang cakap x nak dengar", author: "PC" },
      { quote: "I want to cry already", author: "JL" },
      { quote: "Lang Jeng Dit / Bawa Bertenang", author: "Charles" },
      { quote: "Yakwah", author: "Sinar" },
      { quote: "Steady bom bi bi", author: "Anon" },
      { quote: "IYKYK", author: "Anon" },
      { quote: "Relax, you are doing fine", author: "Anon" },
      { quote: "Jom makan", author: "Anon" },
      { quote: "To flex or not to flex <the benefits>", author: "Anon" },
      { quote: "I love Aon!", author: "Anon" },    
      { quote: "DAUUU!", author: "DT" },
      { quote: "I love my job!", author: "Anon" },   
      { quote: "What's the loss ratio?", author: "Anon" },  
      { quote: "HAHAHAHA", author: "CWS" }, 
      { quote: "Jom coffee", author: "Anon" }, 
      { quote: "Abang Placement", author: "Anon" },
      { quote: "I got you", author: "Anon" },
      { quote: "Rilek ah", author: "Anon" },
      { quote: "You are the best!", author: "CWS" },

      // Employee Benefits Focused
      { quote: "Is this covered?", author: "Anon" },
      { quote: "Renew with status quo", author: "Anon" },
      { quote: "Loading too high, can go lower ah?", author: "Anon" },
      { quote: "One more option", author: "Anon" },

      // Aon Quotes
      { quote: "Aon is in the business of better decisions.", author: "@on" },
      { quote: "Shape decisions for the better — to protect and enrich the lives of people around the world", author: "@on" },
      { quote: "Have you updated your TRS?", author: "Anon" },   
      { quote: "3 x 3; 4 x 4", author: "Anon" },  
    ];

    async function getQuote() {
      const quoteEl = document.getElementById("quote");
      const authorEl = document.getElementById("author");

      quoteEl.innerText = "Fetching wisdom...";
      authorEl.innerText = "";

      // 80% chance to use your own curated quotes
      if (Math.random() < 0.8) {
        const q = myQuotes[Math.floor(Math.random() * myQuotes.length)];
        quoteEl.innerText = `"${q.quote}"`;
        authorEl.innerText = `- ${q.author}`;
        return;
      }

      // 20% chance to call External API
      try {
        const response = await fetch("https://dummyjson.com/quotes/random");
        if (!response.ok) throw new Error("API Offline");
        
        const data = await response.json();
        quoteEl.innerText = `"${data.quote}"`;
        authorEl.innerText = `- ${data.author}`;
      } catch (error) {
        // Fallback to local quotes if API fails
        const q = myQuotes[Math.floor(Math.random() * myQuotes.length)];
        quoteEl.innerText = `"${q.quote}"`;
        authorEl.innerText = `- ${q.author}`;
      }
    }
  </script>

</body>
</html>
