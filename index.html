<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Of The Day</title>
  <style>
    /* Modern Styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      color: #4a90e2;
      margin-bottom: 20px;
    }

    #quote-container {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #quote {
      font-size: 1.2rem;
      font-style: italic;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    #author {
      font-weight: bold;
      color: #666;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 1rem;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    button:hover {
      background-color: #357abd;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Quote Of The Day from CWS</h1>
    
    <div id="quote-container">
      <p id="quote">Click the button to get inspired</p>
      <p id="author"></p>
    </div>

    <button onclick="getQuote()">Get Live Quote</button>
  </div>

  <script>
    const myQuotes = [
      { quote: "Orang cakap x nak dengar", author: "JL" },
      { quote: "Lang Jeng Dit", author: "Charles" },
      { quote: "Steady bom bi bi", author: "Anon" },

      // Employee Benefits Focused
      { quote: "A ping-pong table is not a benefits package. Dental insurance is.", author: "CWS" },
      { quote: "Good salaries get people in the door; great benefits keep them from looking for the exit.", author: "CWS" },
      { quote: "I'm the person HR calls when they realize 'thoughts and prayers' aren't a valid health plan.", author: "CWS" },
      { quote: "Employee benefits: Because 'Employee of the Month' plaques don't pay for root canals.", author: "CWS" },
  
      // General Insurance & Risk
      { quote: "Insurance: The only product you buy and pray you never have to use.", author: "CWS" },
      { quote: "I’m not a superhero, but I do provide 'Umbrella' coverage.", author: "CWS" },
      { quote: "Risk managed well is opportunity unlocked.", author: "CWS" },
      { quote: "Premium is what you pay, Peace of Mind is what I deliver.", author: "CWS" },
      { quote: "Why did the broker cross the road? To mitigate the risk of the chicken's journey.", author: "CWS" }

      // Aon
      { quote: "Aon is in the business of better decisions.", author: "Aon" },
      { quote: "Shape decisions for the better — to protect and enrich the lives of people around the world", author: "Aon" },
    ];

    async function getQuote() {
      const quoteEl = document.getElementById("quote");
      const authorEl = document.getElementById("author");

      quoteEl.innerText = "Fetching wisdom...";
      authorEl.innerText = "";

      // 80% chance to use your own quote
      if (Math.random() < 0.8) {
        const q = myQuotes[Math.floor(Math.random() * myQuotes.length)];
        quoteEl.innerText = `"${q.quote}"`;
        authorEl.innerText = `- ${q.author}`;
        return;
      }

      // Otherwise call DummyJSON API
      try {
        const response = await fetch("https://dummyjson.com/quotes/random");
        if (!response.ok) throw new Error("API Down");
        
        const data = await response.json();
        
        // DummyJSON uses 'quote' and 'author' keys
        quoteEl.innerText = `"${data.quote}"`;
        authorEl.innerText = `- ${data.author}`;
      } catch (error) {
        // Fallback to your quotes if API fails
        const q = myQuotes[Math.floor(Math.random() * myQuotes.length)];
        quoteEl.innerText = `"${q.quote}"`;
        authorEl.innerText = `- ${q.author}`;
      }
    }
  </script>

</body>
</html>
